<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 — 5 Seconds</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0f0f13;
            font-family: 'Pretendard', sans-serif;
            color: #fff;
            padding: 24px;
        }

        .scene {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            text-align: center;
        }

        .logo {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #666;
        }

        .title {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.1;
        }

        .title span {
            background: linear-gradient(135deg, #ff6b6b, #5b9fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-box {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .form-box input {
            width: 100%;
            padding: 16px 18px;
            background: #1a1a22;
            border: 1px solid #2a2a35;
            border-radius: 14px;
            color: #fff;
            font-family: 'Pretendard', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.15s ease;
        }

        .form-box input::placeholder {
            color: #444;
        }

        .form-box input:focus {
            border-color: #5b9fff;
        }

        .btn-login {
            width: 100%;
            padding: 18px;
            background: #fff;
            color: #0f0f13;
            font-family: 'Pretendard', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease;
            margin-top: 4px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            background: #e8e8f0;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .flash {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: 12px;
            color: #ff6b6b;
            font-size: 0.9rem;
            text-align: center;
        }

        .footer {
            font-size: 0.75rem;
            color: #333;
            letter-spacing: 0.05em;
        }
    </style>
</head>

<body>

<div class="scene">

    <div class="header">
        <p class="logo">5 Seconds</p>
        <h1 class="title"><span>로그인</span></h1>
    </div>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="flash">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form class="form-box" method="post">
        <input name="username" placeholder="아이디" autocomplete="username">
        <input name="password" type="password" placeholder="비밀번호" autocomplete="current-password">
        <button type="submit" class="btn-login">로그인</button>
    </form>

    <p class="footer">© 5 Seconds</p>

</div>

</body>
</html>
