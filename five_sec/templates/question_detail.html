<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5 Seconds</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            overflow: hidden;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0f0f13;
            font-family: 'Pretendard', sans-serif;
            color: #fff;
        }

        .scene {
            width: 100%;
            max-width: 400px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }

        /* 상단 로고 */
        .logo {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #666;
        }

        /* 카드 */
        .swipe-card {
            width: 100%;
            position: relative;
            background: #1c1c24;
            border-radius: 24px;
            border: 1px solid #2e2e3e;
            padding: 48px 32px;
            text-align: center;
            cursor: grab;
            user-select: none;
            box-shadow: 0 24px 60px rgba(0,0,0,0.5);
            transition: transform 0.35s cubic-bezier(.22,.68,0,1.2), box-shadow 0.35s ease;
            will-change: transform;
        }
        .swipe-card.swiping {
            transition: none;
        }
        .swipe-card:active { cursor: grabbing; }

        .question-text {
            font-size: 1.35rem;
            font-weight: 600;
            line-height: 1.6;
            color: #f0f0f5;
            letter-spacing: -0.01em;
        }

        /* 선택 오버레이 */
        .choice-label {
            position: absolute;
            top: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            opacity: 0;
            pointer-events: none;
            padding: 5px 12px;
            border-radius: 8px;
            border: 2px solid;
            transition: opacity 0.1s ease;
        }
        .choice-left {
            left: 20px;
            color: #ff6b6b;
            border-color: #ff6b6b;
            rotate: -8deg;
        }
        .choice-right {
            right: 20px;
            color: #5b9fff;
            border-color: #5b9fff;
            rotate: 8deg;
        }

        /* 배경 틴트 */
        .tint {
            position: absolute;
            inset: 0;
            border-radius: 24px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s ease;
        }
        .tint-left  { background: radial-gradient(circle at 0% 50%, rgba(255,107,107,0.15), transparent 70%); }
        .tint-right { background: radial-gradient(circle at 100% 50%, rgba(91,159,255,0.15), transparent 70%); }

        /* 힌트 */
        .hint-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 0 4px;
        }
        .hint-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.78rem;
            color: #444;
        }
        .hint-item span { font-size: 1rem; }
        .hint-item.right { flex-direction: row-reverse; color: #444; }

        /* 진행 도트 */
        .progress-dots {
            display: flex;
            gap: 8px;
        }
        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #2e2e3e;
        }
        .dot.active {
            background: #fff;
        }
    </style>
</head>

<body>

<div class="scene">

    <p class="logo">5 Seconds</p>

    <div class="swipe-card" id="swipeCard">
        <div class="tint tint-left"  id="tintLeft"></div>
        <div class="tint tint-right" id="tintRight"></div>

        <span class="choice-label choice-left"  id="labelLeft">{{ question_.left_text }}</span>
        <span class="choice-label choice-right" id="labelRight">{{ question_.right_text }}</span>

        <p class="question-text">{{ question_.subject }}</p>
    </div>

    <div class="hint-row">
        <div class="hint-item">
            <span>←</span>
            <p>{{ question_.left_text }}</p>
        </div>
        <div class="hint-item right">
            <span>→</span>
            <p>{{ question_.right_text }}</p>
        </div>
    </div>

</div>

<script>
    const card       = document.getElementById('swipeCard');
    const labelLeft  = document.getElementById('labelLeft');
    const labelRight = document.getElementById('labelRight');
    const tintLeft   = document.getElementById('tintLeft');
    const tintRight  = document.getElementById('tintRight');

    const leftUrl  = "{{ url_for('question.start') }}";
    const rightUrl = "{{ url_for('question.start') }}";

    let startX = 0, currentX = 0, isDragging = false;
    const THRESHOLD = 90;

    function onStart(x) {
        startX = x;
        isDragging = true;
        card.classList.add('swiping');
    }

    function onMove(x) {
        if (!isDragging) return;
        currentX = x - startX;
        const rotate = currentX * 0.07;
        card.style.transform = `translateX(${currentX}px) rotate(${rotate}deg)`;

        const ratio = Math.min(Math.abs(currentX) / THRESHOLD, 1);
        if (currentX < 0) {
            labelLeft.style.opacity  = ratio;
            tintLeft.style.opacity   = ratio;
            labelRight.style.opacity = 0;
            tintRight.style.opacity  = 0;
        } else {
            labelRight.style.opacity = ratio;
            tintRight.style.opacity  = ratio;
            labelLeft.style.opacity  = 0;
            tintLeft.style.opacity   = 0;
        }
    }

    function onEnd() {
        if (!isDragging) return;
        isDragging = false;
        card.classList.remove('swiping');

        if (currentX < -THRESHOLD) {
            card.style.transition = 'transform 0.35s cubic-bezier(.4,0,.2,1), opacity 0.3s ease';
            card.style.transform  = 'translateX(-130%) rotate(-18deg)';
            card.style.opacity    = '0';
            setTimeout(() => { window.location.href = leftUrl; }, 350);
        } else if (currentX > THRESHOLD) {
            card.style.transition = 'transform 0.35s cubic-bezier(.4,0,.2,1), opacity 0.3s ease';
            card.style.transform  = 'translateX(130%) rotate(18deg)';
            card.style.opacity    = '0';
            setTimeout(() => { window.location.href = rightUrl; }, 350);
        } else {
            card.style.transition = 'transform 0.35s cubic-bezier(.22,.68,0,1.2)';
            card.style.transform  = '';
            labelLeft.style.opacity  = 0;
            labelRight.style.opacity = 0;
            tintLeft.style.opacity   = 0;
            tintRight.style.opacity  = 0;
        }
        currentX = 0;
    }

    card.addEventListener('mousedown',  e => onStart(e.clientX));
    window.addEventListener('mousemove', e => onMove(e.clientX));
    window.addEventListener('mouseup',   onEnd);

    card.addEventListener('touchstart', e => onStart(e.touches[0].clientX), { passive: true });
    window.addEventListener('touchmove', e => onMove(e.touches[0].clientX), { passive: true });
    window.addEventListener('touchend',  onEnd);
</script>

</body>
</html>
